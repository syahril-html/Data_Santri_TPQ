<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard TPQ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h3>TPQ Desa</h3>
            </div>
            <nav class="sidebar-menu">
                <ul>
                    <li class="active"><a href="#">Data Santri</a></li>
                    <li><a href="#">Data Guru</a></li>
                    <li><a href="#">Data Kelas</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <span class="user-info">User: admin | Tanggal: 15-04-2026</span>
            </header>

            <div id="modalTambah" class="modal">
                <div class="modal-content" style="max-width: 800px;">
                    <h3>Tambah Data Santri Baru</h3>
                    <form id="formTambah" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label>Nama Lengkap:</label>
                            <input type="text" id="nama" required placeholder="Nama lengkap">
                            <label>NIK Santri:</label>
                            <input type="text" id="nik" placeholder="16 digit NIK">
                            <label>TTL:</label>
                            <input type="text" id="ttl" placeholder="Tempat, Tgl Lahir">
                            <label>Kelas:</label>
                            <input type="text" id="kelas" required placeholder="Contoh: Jilid 4">
                            <label>No. KK:</label>
                            <input type="text" id="no_kk" placeholder="Nomor Kartu Keluarga">
                        </div>
                        <div>
                            <label>Nama Ayah:</label>
                            <input type="text" id="ayah" placeholder="Nama Ayah">
                            <label>NIK Ayah:</label>
                            <input type="text" id="nik_ayah" placeholder="NIK Ayah">
                            <label>Nama Ibu:</label>
                            <input type="text" id="ibu" placeholder="Nama Ibu">
                            <label>NIK Ibu:</label>
                            <input type="text" id="nik_ibu" placeholder="NIK Ibu">
                        </div>
                        
                        <div style="grid-column: span 2; display: flex; gap: 10px; margin-top: 10px;">
                            <button type="submit" class="btn-save">Simpan Data</button>
                            <button type="button" onclick="toggleTambah()" class="btn-cancel">Batal</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="content-body">
                <div class="header">
                    <div class="header-tabel">
                        <h2>Data Siswa</h2>
                        <button class="btn-add" onclick="toggleTambah()">+ Tambah Santri</button>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Nama</th>
                                    <th>NIK</th>
                                    <th>TTL</th>
                                    <th>Kelas</th>
                                    <th>No KK</th>
                                    <th>Ayah</th>
                                    <th>NIK Ayah</th>
                                    <th>Ibu</th>
                                    <th>NIK Ibu</th>
                                    <th>Status</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-santri">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
        <div id="modalEdit" class="modal">
            <div class="modal-content" style="max-width: 800px;">
                <h3>Edit Data Santri</h3>
                <form id="formEdit" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="hidden" id="edit-id"><div>
                        <label>Nama Lengkap:</label>
                        <input type="text" id="edit-nama" required>
                        <label>NIK Santri:</label>
                        <input type="text" id="edit-nik">
                        <label>TTL:</label>
                        <input type="text" id="edit-ttl">
                        <label>Kelas:</label>
                        <input type="text" id="edit-kelas" required>
                        <label>No. KK:</label>
                        <input type="text" id="edit-no_kk">
                    </div>
                    <div>
                        <label>Nama Ayah:</label>
                        <input type="text" id="edit-ayah">
                        <label>NIK Ayah:</label>
                        <input type="text" id="edit-nik_ayah">
                        <label>Nama Ibu:</label>
                        <input type="text" id="edit-ibu">
                        <label>NIK Ibu:</label>
                        <input type="text" id="edit-nik_ibu">
                    </div>
                    
                    <div style="grid-column: span 2; display: flex; gap: 10px; margin-top: 10px;">
                        <button type="submit" class="btn-save">Update Data</button>
                        <button type="button" onclick="toggleEdit()" class="btn-cancel">Batal</button>
                    </div>
                </form>
            </div>
        </div>
    <div id="modalDetail" class="modal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6);">
    <div style="background:white; margin:10% auto; padding:25px; width:400px; border-radius:12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
        <h3 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">Detail Informasi Santri</h3>
        <div id="isiDetail" style="line-height: 2; margin: 15px 0;">
            </div>
        <button onclick="document.getElementById('modalDetail').style.display='none'" style="width:100%; padding:10px; background:#34495e; color:white; border:none; border-radius:5px; cursor:pointer;">Tutup</button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
